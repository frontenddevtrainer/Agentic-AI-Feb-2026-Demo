services:

  # -------------------------------------------------------------------
  # FastAPI RAG API  →  http://localhost:8000
  # Docs available at http://localhost:8000/docs
  # -------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app          # live-reload: code changes reflect without rebuild
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Streamlit document ingest UI  →  http://localhost:8501
  # -------------------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      streamlit run upload_document.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app          # live-reload: code changes reflect without rebuild
    restart: unless-stopped
